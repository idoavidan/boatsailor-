<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⛵ Sail — Multiplayer Sailing</title>
  </head>
  <body>
    <canvas id="scene"></canvas>

    <!-- Start menu -->
    <div id="menu" class="overlay">
      <!-- Live ocean revolving behind the menu (see MenuBackground), so the
           lobby looks like the game. Decorative; never captures taps. -->
      <canvas id="menu-bg"></canvas>
      <div class="panel">
        <h1>⛵ Sail</h1>
        <p class="tagline">Multiplayer sailing — pick your waters</p>

        <input id="name" type="text" placeholder="Captain name" maxlength="16" />

        <div class="modes">
          <button class="mode" data-mode="casual">
            <span class="mode-emoji">🌊</span>
            <span class="mode-title">Casual</span>
            <span class="mode-desc">Free roam &amp; relax</span>
          </button>
          <button class="mode" data-mode="speed">
            <span class="mode-emoji">🏁</span>
            <span class="mode-title">Speed</span>
            <span class="mode-desc">Race the course</span>
          </button>
        </div>

        <button id="play">Set sail</button>
        <p id="status" class="status"></p>
      </div>
    </div>

    <!-- In-game HUD -->
    <div id="hud" class="hidden">
      <!-- Leave the current game and return to the menu. -->
      <button id="exit-game" aria-label="Leave and return to the menu">
        ‹ Menu
      </button>
      <div id="wind">
        <!-- polar speed gauge: red near the wind (slow/no-go) → green on a reach -->
        <div id="wind-dial">
          <svg id="wind-face" viewBox="0 0 100 100" aria-hidden="true">
            <!-- your boat, bow up (= your heading / where you look) -->
            <polygon class="wd-boat" points="50,38 43,62 57,62" />
            <!-- the boom/sail, swinging out to the trimmed (leeward) side -->
            <g id="dial-boom">
              <line class="wd-boom" x1="50" y1="45" x2="50" y2="62" />
            </g>
            <!-- wind arrow sits on the rim where the wind comes from and blows
                 IN toward the boat (it orbits the boat as the wind shifts) -->
            <g id="wind-needle">
              <line class="wd-needle" x1="50" y1="11" x2="50" y2="23" />
              <polygon class="wd-needle-head" points="50,35 42,22 58,22" />
            </g>
          </svg>
        </div>
        <span id="wind-label">wind</span>
        <div id="players"></div>
      </div>

      <div id="race-banner" class="hidden"></div>
      <div id="race-info" class="hidden"></div>
      <div id="standings" class="hidden"></div>

      <!-- leg-up tactical radar (speed mode): next mark at top, no-go laylines,
           other boats. Shown/hidden by the Game. -->
      <canvas id="minimap" class="hidden"></canvas>

      <div id="speedo"></div>

      <!-- Flow cue: lights up when surfing a wave downwind or holding good VMG
           upwind (in the groove). Driven each frame by the Game. -->
      <div id="flow-badge" class="hidden"></div>

      <!-- On-screen controls for touch devices (shown in landscape). Steering on
           the left thumb, sail power on the right. -->
      <div id="touch-controls">
        <div class="touch-cluster left">
          <button class="touch-btn" id="touch-left" aria-label="Steer to port">
            ◀<small>port</small>
          </button>
          <button class="touch-btn" id="touch-right" aria-label="Steer to starboard">
            ▶<small>stbd</small>
          </button>
        </div>
        <div class="touch-cluster right">
          <button class="touch-btn" id="touch-brake" aria-label="Slow down">
            ▼<small>slow</small>
          </button>
          <button class="touch-btn" id="touch-throttle" aria-label="Raise sail">
            ▲<small>sail</small>
          </button>
        </div>
      </div>
    </div>

    <!-- Post-race results: who won + final standings, shown once everyone has
         crossed the finish line. "Back to menu" returns to the start screen. -->
    <div id="race-over" class="overlay hidden">
      <div class="panel">
        <h1 id="race-over-title">Race over</h1>
        <p id="race-over-sub" class="tagline">Final standings</p>
        <table id="race-over-table"></table>
        <button id="race-over-menu">Back to menu</button>
      </div>
    </div>

    <!-- Portrait phones can't fit the controls — ask the player to rotate. -->
    <div id="rotate-notice">
      <div class="rotate-icon">📱</div>
      <h2>Rotate your phone</h2>
      <p>Turn your device sideways to sail — the on-screen controls live in landscape.</p>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
